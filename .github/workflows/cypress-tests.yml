name: Cypress Tests (Node 18)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  cypress-run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: |
          # Install a Cypress version compatible with Node 18
          npm install cypress@12.17.4 --save-dev
          npm ci || true  # Continue even if package-lock.json has conflicts
          npx cypress verify

      - name: Run Cypress tests 🚀
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          config: baseUrl=https://automationexercise.com

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            cypress/screenshots
            cypress/videos
