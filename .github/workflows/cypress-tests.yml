name: Cypress Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  cypress-run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npx cypress verify  # Verify Cypress is installed correctly

      - name: Run Cypress tests 🌩
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          config: baseUrl=https://automationexercise.com
          # If you don't need to start a server (testing live site)
          # you can comment out or remove start/wait-on
          start: npm start # Remove this if you don't need to start a local server
          wait-on: "https://automationexercise.com"
          wait-on-timeout: 60
          record: false # Set to true if you have Cypress Cloud account

      - name: 📸 Upload screenshots (if tests fail)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ github.run_id }}
          path: |
            cypress/screenshots
            cypress/results
          retention-days: 7 # Keep artifacts for 7 days

      - name: 🎥 Upload videos (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ github.run_id }}
          path: cypress/videos
          retention-days: 7

      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🌿 Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
